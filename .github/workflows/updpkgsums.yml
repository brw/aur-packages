name: updpkgsums

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  updpkgsums:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Find updated package
        id: find-package
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail

          echo "PKGBUILD=$(git diff --name-only origin/main origin/${GITHUB_HEAD_REF} "*PKGBUILD" | head -1 | xargs dirname)" >> $GITHUB_OUTPUT

      - name: Validate package
        if: ${{ steps.find-package.outputs.PKGBUILD != '' }}
        uses: ./.github/actions/aur
        with:
          pkgname: ${{ steps.find-package.outputs.PKGBUILD }}

      - name: Commit
        if: ${{ steps.find-package.outputs.PKGBUILD != '' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          file_pattern: '*/PKGBUILD */.SRCINFO'
